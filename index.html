    <main>
        <section class="controls">
            <button type="button" class="btn btn-diff" id="diffBtn">
                🔍 Режим различий
            </button>

            <button type="button" class="btn btn-compare" id="compareBtn">
                📸 Сравнить с эталоном
            </button>

            <div class="slider-container">
                <label for="opacitySlider" class="slider-label">Прозрачность:</label>
                <input type="range"
                       id="opacitySlider"
                       min="0"
                       max="1"
                       step="0.01"
                       value="1">
                <output for="opacitySlider" class="opacity-value" id="opacityValue">100%</output>
            </div>
        </section>

        <section class="canvas-container">
            <img src="./images/input.png"
                 alt="Эталонное изображение"
                 class="reference-image">
            <iframe src="output.html"
                    class="output-frame"
                    id="outputFrame"
                    title="CSS рисунок"></iframe>
        </section>

        <p class="hint">Используйте слайдер для сравнения CSS-рисунка с эталоном</p>
    </main>

    <!-- Контейнер для анимации успеха -->
    <aside id="successOverlay"
           class="success-overlay">
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="success-message">
            <div class="success-icon">🎉</div>
            <h2>Отлично!</h2>
            <p>Совпадение: <span id="successPercent">0</span>%</p>
        </div>
    </aside>

    <!-- Модальное окно для результатов сравнения -->
    <dialog id="compareModal"
            class="modal">
        <div class="modal-content">
            <button type="button"
                    class="modal-close">
                &times;
            </button>
            <h2 id="modalTitle">Результат сравнения</h2>
            <section class="compare-results">
                <div class="compare-stat">
                    <span class="stat-label">Различие:</span>
                    <span class="stat-value" id="diffPercent">—</span>
                </div>
                <div class="compare-stat">
                    <span class="stat-label">Совпадение:</span>
                    <span class="stat-value" id="matchPercent">—</span>
                </div>
            </section>
            <section class="compare-images">
                <figure class="compare-image-container">
                    <figcaption><h3>Эталон</h3></figcaption>
                    <img id="referencePreview" alt="Эталонное изображение">
                </figure>
                <figure class="compare-image-container">
                    <figcaption><h3>Скриншот</h3></figcaption>
                    <img id="screenshotPreview" alt="Скриншот текущего результата">
                </figure>
                <figure class="compare-image-container">
                    <figcaption><h3>Различия</h3></figcaption>
                    <img id="diffPreview" alt="Изображение с выделенными различиями">
                </figure>
            </section>
        </div>
    </dialog>

    <!-- Подключаем библиотеки через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/resemblejs@5.0.0/resemble.min.js"></script>

    <!-- Подключаем наш скрипт -->
    <script src="scripts/index.js"></script>
